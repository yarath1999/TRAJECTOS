name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run typecheck

  snapshots:
    name: Snapshot Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run snapshot tests
        run: npm run snapshots

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-results
          path: test-results/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=registry,ref=trajectos:buildcache
          tags: trajectos:${{ github.sha }},trajectos:latest

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trajectos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: trajectos
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://trajectos:test@localhost:5432/trajectos

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [typecheck, snapshots, lint, test]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ TypeScript type check failed"
            exit 1
          fi
          if [ "${{ needs.snapshots.result }}" != "success" ]; then
            echo "❌ Snapshot tests failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "⚠️  Linting issues found (warnings only)"
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All checks passed"

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const typecheck = '${{ needs.typecheck.result }}' === 'success' ? '✅' : '❌';
            const snapshots = '${{ needs.snapshots.result }}' === 'success' ? '✅' : '❌';
            const lint = '${{ needs.lint.result }}' === 'success' ? '✅' : '⚠️';
            const test = '${{ needs.test.result }}' === 'success' ? '✅' : '❌';

            const body = `## CI Summary
            - ${typecheck} TypeScript Type Check
            - ${snapshots} Snapshot Tests
            - ${lint} ESLint
            - ${test} Integration Tests
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
